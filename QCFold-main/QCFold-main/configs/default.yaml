# QCFold Configuration
# Hybrid Quantum-Classical Fold-Switching Protein Structure Prediction

data:
  benchmark: "fold_switching_92"
  pdb_dir: "data/pdb"
  cache_dir: "data/cache"
  max_seq_len: 512
  num_torsion_bins: 8       # Discretization for phi/psi angles
  fold_switch_region_pad: 5  # Padding around annotated switching regions

model:
  # Sequence encoder
  encoder:
    type: "esm2"
    model_name: "esm2_t6_8M_UR50D"  # Smallest ESM-2 for CPU demo
    embed_dim: 320
    freeze: true

  # Structure generator
  generator:
    type: "fragment_diffusion"
    hidden_dim: 256
    num_layers: 4
    num_heads: 8
    diffusion_steps: 100
    num_candidates: 32      # Generate this many candidate structures

  # Quantum variational refinement
  quantum:
    enabled: true
    backend: "default.qubit"  # PennyLane simulator
    num_qubits_per_residue: 2  # Binary fold state + confidence
    max_region_size: 16        # Max residues in quantum circuit
    circuit_depth: 6
    num_layers: 4
    optimizer: "adam"
    lr: 0.01
    max_iterations: 200
    use_classical_fallback: true
    fallback_method: "simulated_annealing"
    sa_temperature: 1.0
    sa_cooling_rate: 0.995

  # Physics / geometry consistency
  physics:
    clash_weight: 10.0
    bond_weight: 5.0
    ramachandran_weight: 2.0
    hydrogen_bond_weight: 1.0
    contact_weight: 1.0
    clash_threshold: 2.0    # Angstroms
    bond_tolerance: 0.05    # Fractional deviation

  # Ensemble head
  ensemble:
    num_conformations: 8
    temperature: 1.0
    diversity_weight: 0.3
    min_tm_diversity: 0.3   # Minimum pairwise TM-score gap for ensemble diversity

  # Ranking
  ranking:
    physics_weight: 0.4
    learned_weight: 0.4
    uncertainty_weight: 0.2

training:
  batch_size: 4
  num_epochs: 100
  lr: 1e-4
  weight_decay: 1e-5
  gradient_clip: 1.0
  warmup_steps: 1000
  
  # Loss weights
  losses:
    coordinate_loss: 1.0
    distance_map_loss: 0.5
    torsion_loss: 0.3
    ensemble_coverage_loss: 0.5
    calibration_loss: 0.2
    clash_penalty: 0.1
    fold_switch_loss: 1.0   # Novel: penalize missing alternative conformation

evaluation:
  tm_score_threshold: 0.6
  rmsd_threshold: 5.0
  num_seeds: 5
  bootstrap_samples: 1000
  confidence_level: 0.95

device: "cpu"
seed: 42
output_dir: "outputs"
